<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HeadSync" />
  <meta name="description" content="HeadSync — Cài đặt thành công." />
  <title>Cài Đặt Thành Công</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark:      #070709;
      --bg-panel:     rgba(22, 22, 26, 0.75);
      --text-main:    #f3f4f6;
      --text-muted:   #9ca3af;
      --success:      #10b981;
      --success-glow: rgba(16, 185, 129, 0.4);
      --zalo:         #0066ff;
      --zalo-glow:    rgba(0, 102, 255, 0.4);
      --border:       rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-dark);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ═══════════════════════════════════════
       BACKGROUND EFFECTS
    ═══════════════════════════════════════ */
    #particle-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
      opacity: 0.6;
    }
    .bg-effects {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-grid {
      position: absolute; width: 200%; height: 200%;
      top: -10%; left: -50%;
      background-image:
        linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: perspective(600px) rotateX(60deg) translateY(-100px) translateZ(-200px);
      animation: gridMove 12s linear infinite;
    }
    @keyframes gridMove {
      0%   { transform: perspective(600px) rotateX(60deg) translateY(0)    translateZ(-200px); }
      100% { transform: perspective(600px) rotateX(60deg) translateY(40px) translateZ(-200px); }
    }
    .ambient-glow {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, var(--success-glow) 0%, transparent 60%);
      filter: blur(80px); opacity: 0.3;
      animation: floatGlow 12s ease-in-out infinite alternate;
    }
    .ambient-glow.top    { top: -200px; left: -150px; }
    .ambient-glow.bottom { bottom: -200px; right: -150px; background: radial-gradient(circle, var(--zalo-glow) 0%, transparent 60%); animation-delay: -6s; }
    @keyframes floatGlow {
      0%   { transform: translate(0,0)      scale(1);   }
      100% { transform: translate(40px,40px) scale(1.1); }
    }

    /* ═══════════════════════════════════════
       SUCCESS MODAL
    ═══════════════════════════════════════ */
    .modal-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 380px;
      padding: 0 20px;
    }
    .modal-box {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 28px; padding: 50px 30px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: modalIn 0.8s cubic-bezier(0.34,1.56,0.64,1);
      backdrop-filter: blur(16px);
    }
    @keyframes modalIn { 
      from { transform: scale(0.85) translateY(30px); opacity: 0; } 
      to { transform: scale(1) translateY(0); opacity: 1; } 
    }

    .success-icon-wrap {
      position: relative; width: 90px; height: 90px; margin: 0 auto 30px;
    }
    .success-icon {
      width: 100%; height: 100%; border-radius: 50%;
      background: rgba(16, 185, 129, 0.1);
      border: 2px solid var(--success);
      display: flex; align-items: center; justify-content: center;
      color: var(--success);
      box-shadow: 0 0 30px var(--success-glow), inset 0 0 20px rgba(16,185,129,0.2);
      animation: pulseSuccess 2s infinite;
      position: relative; z-index: 2;
    }
    .success-radar {
      position: absolute; border-radius: 50%; border: 1px solid var(--success);
      top: 50%; left: 50%; transform: translate(-50%,-50%) scale(1);
      animation: radarPulse 2.5s ease-out infinite; pointer-events: none;
      width: 100%; height: 100%;
    }
    .success-radar:nth-child(2) { animation-delay: 0.8s; }
    .success-radar:nth-child(3) { animation-delay: 1.6s; }

    @keyframes pulseSuccess {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px var(--success-glow); }
      50% { transform: scale(1.05); box-shadow: 0 0 50px var(--success-glow); }
    }
    @keyframes radarPulse {
      0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
    }

    .modal-title { 
      font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; 
      color: var(--success); margin-bottom: 12px; letter-spacing: 1px;
      text-shadow: 0 0 15px var(--success-glow);
    }
    .modal-sub { 
      font-size: 14px; color: var(--text-muted); margin-bottom: 40px; line-height: 1.6; 
    }

    /* ZALO BUTTON */
    .zalo-btn {
      width: 100%; padding: 18px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, #0066ff, #0044cc);
      color: #fff; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
      letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 14px;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 8px 25px rgba(0, 102, 255, 0.4), inset 0 2px 0 rgba(255,255,255,0.2);
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position: relative; overflow: hidden;
    }
    .zalo-btn:hover {
      transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 102, 255, 0.5), inset 0 2px 0 rgba(255,255,255,0.2);
    }
    .zalo-btn:active {
      transform: scale(0.96); box-shadow: 0 5px 15px rgba(0, 102, 255, 0.3);
    }
    .zalo-icon-box {
      background: #fff; color: #0066ff; width: 34px; height: 34px;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .zalo-icon-box svg {
      width: 22px; height: 22px;
    }

    footer {
      position: fixed; bottom: 20px; left: 0; width: 100%;
      text-align: center; color: rgba(255,255,255,0.2); font-size: 10px;
      font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
    }
  </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="bg-effects">
  <div class="bg-grid"></div>
  <div class="ambient-glow top"></div>
  <div class="ambient-glow bottom"></div>
</div>

<div class="modal-wrap">
  <div class="modal-box">
    
    <div class="success-icon-wrap">
      <div class="success-radar"></div>
      <div class="success-radar"></div>
      <div class="success-radar"></div>
      <div class="success-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
      </div>
    </div>

    <div class="modal-title">CÀI ĐẶT THÀNH CÔNG</div>
    <div class="modal-sub">
      Bạn đã cấu hình thành công vào thiết bị.<br>
      Hãy tham gia nhóm Zalo để nhận hỗ trợ!
    </div>

    <a href="https://zalo.me/g/ibyisiar5mlfgy5dwfh3" target="_blank" style="text-decoration:none;">
      <button class="zalo-btn">
        <div class="zalo-icon-box">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.5 11.5c0-4.694-4.253-8.5-9.5-8.5S2.5 6.806 2.5 11.5c0 4.14 3.32 7.6 7.82 8.35.32.05.65.13.91.31.25.17.43.43.51.72l.46 1.77c.05.19.19.34.38.41.19.06.4.04.57-.06l2.5-1.5c.2-.12.44-.16.67-.12 1.63.26 3.35.09 4.88-.49 2.59-1.02 4.3-3.41 4.3-6.19zM8.5 14h-3c-.28 0-.5-.22-.5-.5s.22-.5.5-.5h3c.28 0 .5.22.5.5s-.22.5-.5.5zm5 0h-2c-.28 0-.5-.22-.5-.5s.22-.5.5-.5h2c.28 0 .5.22.5.5s-.22.5-.5.5zm4 0h-2c-.28 0-.5-.22-.5-.5s.22-.5.5-.5h2c.28 0 .5.22.5.5s-.22.5-.5.5zM12 9c-.28 0-.5-.22-.5-.5V6.5c0-.28.22-.5.5-.5s.5.22.5.5v2c0 .28-.22.5-.5.5zm-4 0c-.28 0-.5-.22-.5-.5V6.5c0-.28.22-.5.5-.5s.5.22.5.5v2c0 .28-.22.5-.5.5zm8 0c-.28 0-.5-.22-.5-.5V6.5c0-.28.22-.5.5-.5s.5.22.5.5v2c0 .28-.22.5-.5.5z"/>
          </svg>
        </div>
        THAM GIA NHÓM ZALO
      </button>
    </a>

  </div>
</div>

<footer>HEADSYNC &copy; 2025 | SECURE SYSTEM</footer>

<script>
/* ═══════════════════════════════════════════
   PARTICLE SYSTEM (Màu xanh lá cho đồng bộ với Success)
═══════════════════════════════════════════ */
(function initParticles() {
  const canvas = document.getElementById('particle-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const COUNT = 35;
  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x:  Math.random() * W,
      y:  Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r:  Math.random() * 1.8 + 0.5,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(16,185,129,${0.15 * (1 - dist/120)})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(16,185,129,0.5)';
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
